<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://www.gstatic.com; frame-src 'none'; object-src 'none'; base-uri 'self';">
    <title>Admin - Subli Pop</title>
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="../assets/firebase-config.js"></script>
    <style>
        :root {
            --primary: #e040fb;
            --secondary: #7c4dff;
            --accent: #ff5252;
            --cyan: #00bcd4;
            --bg-light: #f8f9fa;
            --bg-dark: #0a0a0f;
            --text-dark: #1a1a2e;
            --text-light: #ffffff;
            --text-muted: rgba(26,26,46,0.6);
            --card-bg: #ffffff;
            --border-color: rgba(0,0,0,0.08);
            --sidebar-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-light: #0a0a0f;
            --bg-dark: #050508;
            --text-dark: #ffffff;
            --text-muted: rgba(255,255,255,0.6);
            --card-bg: #1a1a24;
            --border-color: rgba(255,255,255,0.1);
            --sidebar-bg: #12121a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }

        .login-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 20px 60px rgba(224,64,251,0.1);
            border: 1px solid var(--border-color);
        }

        .login-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            color: white;
        }

        .login-title {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            background: var(--bg-light);
            color: var(--text-dark);
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(224,64,251,0.1);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(224,64,251,0.4);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .login-error {
            background: rgba(255,82,82,0.1);
            border: 1px solid rgba(255,82,82,0.3);
            color: var(--accent);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 1rem;
            display: none;
        }

        .login-error.show { display: block; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .back-link:hover { color: var(--primary); }

        .login-info {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">SP</div>
            <h1 class="login-title">Panel de Administración</h1>
            <p class="login-subtitle">Ingresa tus credenciales para continuar</p>

            <div class="login-error" id="loginError">Credenciales incorrectas. Intenta de nuevo.</div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" class="form-input" id="email" placeholder="admin@ejemplo.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-input" id="password" placeholder="Tu contraseña" required>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Ingresar</button>
            </form>

            <a href="../index.html" class="back-link">← Volver al sitio</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const loginBtn = document.getElementById('loginBtn');

        // Check if user is already logged in
        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.textContent = 'Verificando...';
            loginError.classList.remove('show');

            try {
                await auth.signInWithEmailAndPassword(email, pass);
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error('Login error:', error);
                loginError.textContent = getErrorMessage(error.code);
                loginError.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Ingresar';
            }
        });

        function getErrorMessage(code) {
            const messages = {
                'auth/invalid-email': 'El correo no es válido.',
                'auth/user-disabled': 'Esta cuenta ha sido deshabilitada.',
                'auth/user-not-found': 'No existe una cuenta con este correo.',
                'auth/wrong-password': 'Contraseña incorrecta.',
                'auth/invalid-credential': 'Credenciales incorrectas. Intenta de nuevo.',
            };
            return messages[code] || 'Error al iniciar sesión. Intenta de nuevo.';
        }
    </script>
</body>
</html>
